# ItemChecklist localisation source (Iter-11). Generated into native
# TextDataBlock assets at build time by utils/LocalizationGenerator.cs.
# ASCII rule: never use the real ellipsis U+2026 (CK thinTiny font crashes —
# docs/gotchas.md) or em-dash U+2014; use '...' and '-'. German umlauts are fine.
# MT later = add a language key (fr/it/ja/ko/ru/es/uk/zh-ch/zh-tw/th/pt-br).
ItemChecklist-General:
  SearchHint:
    hint: "Placeholder text in the search input box"
    en: "Search..."
    de: "Suchen..."
  Shown:
    hint: "Footer left label. {0} = count of items visible after filtering."
    en: "{0} shown"
    de: "{0} angezeigt"
  Level:
    hint: "Per-row level column. {0} = level number."
    en: "Lv {0}"
    de: "St. {0}"
  SkinSuffix:
    hint: "Pet skin row suffix. {0} = 1-based skin number."
    en: "(Skin {0})"
    de: "(Skin {0})"
  ColorSuffix:
    hint: "Iter-17 colour-variant row suffix (cattle colours + paintable decor). {0} = CK variation index."
    en: "(Colour {0})"
    de: "(Farbe {0})"
  HoverUndiscovered:
    hint: "Hover tooltip title for an undiscovered (???) row. ASCII only (no em-dash)."
    en: "??? - not yet discovered"
    de: "??? - noch nicht entdeckt"
  HoverUndiscoveredDesc:
    hint: "Hover tooltip description line for an undiscovered (???) row. ASCII only."
    en: "Discover this item to reveal its details."
    de: "Entdecke dieses Item, um seine Details zu sehen."
ItemChecklist-Sorters:
  Name:   { en: "Name",   de: "Name" }
  Rarity: { en: "Rarity", de: "Seltenheit" }
  Level:  { en: "Level",  de: "Stufe" }
  Value:  { en: "Value",  de: "Wert" }
