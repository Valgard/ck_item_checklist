  ClearAll:     { en: "Clear all",     de: "Alle löschen" }
  SecDiscovery: { en: "Discovery",     de: "Entdeckung" }
  SecRarity:    { en: "Rarity",        de: "Seltenheit" }
  SecCategory:  { en: "Category",      de: "Kategorie" }
  SecCraftable: { en: "Craftable",     de: "Herstellbar" }
  Discovered:   { en: "Discovered",    de: "Entdeckt" }
  Undiscovered: { en: "Undiscovered",  de: "Unentdeckt" }
  Craftable:    { en: "Craftable",     de: "Herstellbar" }
  NotCraftable: { en: "Not craftable", de: "Nicht herstellbar" }
